<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Code pénal RP</title>


<style>

* {
    box-sizing:border-box;
}


body {

    margin:0;
    padding:30px;

    background:#111827;

    font-family:Arial, Helvetica, sans-serif;

    color:white;

}



.container {

    max-width:1000px;

    margin:auto;

    background:#1f2937;

    padding:30px;

    border-radius:15px;

}



h1 {

    text-align:center;

    margin-bottom:30px;

}



label {

    display:block;

    margin-bottom:10px;

    color:#cbd5e1;

}



select {

    width:100%;

    padding:12px;

    border-radius:8px;

    border:none;

    background:#374151;

    color:white;

    font-size:16px;

}



.card {

    margin-top:25px;

    background:#111827;

    padding:20px;

    border-radius:12px;

    border-left:5px solid #3b82f6;

}



.card h2 {

    margin-top:0;

    color:#60a5fa;

}



.info {

    display:grid;

    grid-template-columns:150px auto;

    gap:10px;

}



.key {

    color:#94a3b8;

}



.empty {

    margin-top:30px;

    text-align:center;

    color:#94a3b8;

}


</style>

</head>



<body>


<div class="container">


<h1>
⚖️ Code pénal RP
</h1>



<label for="categorie">
Type d'infraction
</label>


<select id="categorie">

<option value="">
-- Choisir une catégorie --
</option>

<option value="Contravention">
Contravention
</option>

<option value="Délit">
Délit
</option>

<option value="Crime">
Crime
</option>


</select>



<div id="resultat">


<div class="empty">
Sélectionnez une catégorie
</div>


</div>



</div>


<script src="script.js"></script>


</body>

</html>
